<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alien Luck Tablet</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#e6dfeb;
      --tablet:#f4f1f8;
      --tablet2:#efeaf6;

      --card:#ffffff;
      --ink:#111827;
      --muted:rgba(17,24,39,0.62);

      --border:rgba(0,0,0,0.10);
      --stroke:rgba(0,0,0,0.12);

      --shadow:0 18px 40px rgba(17,24,39,0.14);
      --inner:inset 0 1px 0 rgba(255,255,255,0.65), inset 0 -2px 10px rgba(17,24,39,0.06);

      --r:22px;
      --ri:16px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"IBM Plex Sans", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .page{
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    /* TABLET SHELL */
    .tablet{
      background: radial-gradient(1200px 450px at 30% 0%, rgba(135,93,166,0.10), rgba(255,255,255,0)),
                  radial-gradient(900px 420px at 100% 40%, rgba(34,197,94,0.08), rgba(255,255,255,0)),
                  linear-gradient(180deg, var(--tablet), var(--tablet2));
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px;
      position: relative;
    }

    .tablet::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.55);
      pointer-events:none;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: stretch;
    }

    /* HUB PANEL (CENTER UNIT / TITLE AREA) */
    .hub{
      grid-column: 1 / -1;
      background: rgba(255,255,255,0.55);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px;
      box-shadow: var(--inner);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      position: relative;
      min-height: 112px;
    }

    .hubMark{
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.55), rgba(255,255,255,0)),
                  radial-gradient(circle at 70% 70%, rgba(0,0,0,0.12), rgba(0,0,0,0)),
                  radial-gradient(circle at 45% 45%, rgba(135,93,166,0.55), rgba(135,93,166,0.10));
      border: 1px solid rgba(0,0,0,0.10);
      box-shadow: 0 10px 24px rgba(17,24,39,0.12);
      margin: 0 auto 10px;
    }

    .hubTitle{
      margin:0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .hubSub{
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .hintRight{
      position:absolute;
      right: 14px;
      top: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    /* WIDGETS */
    .widget{
      background: rgba(255,255,255,0.70);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
      box-shadow: var(--inner);
      position: relative;
      min-height: 152px;
      overflow:hidden;
    }

    .wTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .wTitle{
      margin:0;
      font-size: 14px;
      font-weight: 800;
    }

    .wSub{
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .result{
      border-radius: var(--ri);
      border: 2px solid var(--stroke);
      background: rgba(255,255,255,0.75);
      min-height: 64px;
      padding: 12px 12px;
      display:flex;
      align-items:center;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.01em;
      overflow:hidden;
    }

    .result.mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-weight: 700;
      letter-spacing: 0;
    }

    /* “LIT BUTTON” */
    .btn{
      width: 30px;
      height: 30px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.14);
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.80), rgba(255,255,255,0) 45%),
                  radial-gradient(circle at 60% 60%, var(--c2), rgba(0,0,0,0) 65%),
                  radial-gradient(circle at 40% 40%, var(--c1), rgba(0,0,0,0) 70%),
                  linear-gradient(180deg, rgba(255,255,255,0.22), rgba(0,0,0,0.08));
      box-shadow:
        0 8px 18px rgba(17,24,39,0.18),
        0 0 0 3px rgba(255,255,255,0.55) inset,
        0 0 18px rgba(135,93,166,0.22);
      cursor:pointer;
      flex: 0 0 auto;
      position: relative;
    }

    .btn:active{ transform: translateY(1px); }

    .btn.off{
      opacity: 0.35;
      filter: saturate(0.6);
      box-shadow:
        0 6px 14px rgba(17,24,39,0.12),
        0 0 0 3px rgba(255,255,255,0.45) inset;
      cursor: default;
    }

    /* color bar inside Lucky Colour result */
    .colorBar{
      height: 28px;
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.10);
      background: #d1d5db;
      margin-bottom: 10px;
    }

    .resultStack{
      width:100%;
    }

    .smallRow{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      grid-column: 1 / -1;
    }

    /* mobile */
    @media (max-width: 820px){
      .grid{ grid-template-columns: 1fr; }
      .smallRow{ grid-template-columns: 1fr; }
      .hintRight{ display:none; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="tablet">

      <div class="grid">

        <!-- HUB / TITLE -->
        <section class="hub" aria-label="Tablet hub">
          <div class="hintRight">Refresh to reboot.</div>
          <div>
            <div class="hubMark" aria-hidden="true"></div>
            <h1 class="hubTitle">Alien Luck Tablet</h1>
            <p class="hubSub">Daily directive for blending in.</p>
          </div>
        </section>

        <!-- Row 1 widgets -->
        <section class="widget" id="w-wisdom">
          <div class="wTop">
            <div>
              <p class="wTitle">Cosmic Wisdom</p>
              <p class="wSub" id="sub-wisdom">Tap to receive.</p>
            </div>
            <button class="btn" id="btn-wisdom" style="--c1:#7c3aed;--c2:#22c55e" aria-label="Activate Cosmic Wisdom"></button>
          </div>
          <div class="result mono" id="out-wisdom">—</div>
        </section>

        <section class="widget" id="w-aura">
          <div class="wTop">
            <div>
              <p class="wTitle">Luck Aura</p>
              <p class="wSub" id="sub-aura">Tap to scan.</p>
            </div>
            <button class="btn" id="btn-aura" style="--c1:#06b6d4;--c2:#7c3aed" aria-label="Activate Luck Aura"></button>
          </div>
          <div class="result" id="out-aura">—</div>
        </section>

        <!-- Row 2 small widgets -->
        <section class="smallRow" aria-label="Small widgets row">

          <section class="widget" id="w-colour" style="min-height: 152px;">
            <div class="wTop">
              <div>
                <p class="wTitle">Lucky Colour</p>
                <p class="wSub" id="sub-colour">Tap to calibrate.</p>
              </div>
              <button class="btn" id="btn-colour" style="--c1:#f59e0b;--c2:#22c55e" aria-label="Activate Lucky Colour"></button>
            </div>

            <div class="resultStack">
              <div class="colorBar" id="bar-colour"></div>
              <div class="result mono" id="out-colour">—</div>
            </div>
          </section>

          <section class="widget" id="w-number" style="min-height: 152px;">
            <div class="wTop">
              <div>
                <p class="wTitle">Lucky Number</p>
                <p class="wSub" id="sub-number">Tap to receive.</p>
              </div>
              <button class="btn" id="btn-number" style="--c1:#fb7185;--c2:#60a5fa" aria-label="Activate Lucky Number"></button>
            </div>
            <div class="result mono" id="out-number">—</div>
          </section>

        </section>

        <!-- Row 3 placeholders (we’ll build next) -->
        <section class="widget" id="w-meal">
          <div class="wTop">
            <div>
              <p class="wTitle">Earth Meal</p>
              <p class="wSub" id="sub-meal">Tap to decide.</p>
            </div>
            <button class="btn off" id="btn-meal" style="--c1:#22c55e;--c2:#7c3aed" aria-label="Activate Earth Meal" disabled></button>
          </div>
          <div class="result mono" id="out-meal">Coming next.</div>
        </section>

        <section class="widget" id="w-ent">
          <div class="wTop">
            <div>
              <p class="wTitle">Earth Entertainment</p>
              <p class="wSub" id="sub-ent">Tap to observe.</p>
            </div>
            <button class="btn off" id="btn-ent" style="--c1:#60a5fa;--c2:#7c3aed" aria-label="Activate Earth Entertainment" disabled></button>
          </div>
          <div class="result mono" id="out-ent">Coming next.</div>
        </section>

      </div>
    </div>
  </div>

  <script>
    // No eval. No string-based timeouts. CSP-safe.

    const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

    // “Latin letter motion” (scramble) then reveal
    const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    function scrambleTo(el, finalText, ms = 900, stepMs = 28){
      return new Promise((resolve) => {
        const start = performance.now();
        const len = Math.max(6, String(finalText).length);
        let lastTick = 0;

        function frame(t){
          const p = Math.min(1, (t - start) / ms);
          if (t - lastTick >= stepMs){
            lastTick = t;
            const show = Array.from({length: len}, () => CHARS[Math.floor(Math.random()*CHARS.length)]).join("");
            el.textContent = show;
          }
          if (p < 1){
            requestAnimationFrame(frame);
          } else {
            el.textContent = finalText;
            resolve();
          }
        }
        requestAnimationFrame(frame);
      });
    }

    function lockButton(btn, subEl, doneText){
      btn.classList.add("off");
      btn.disabled = true;
      if (subEl) subEl.textContent = doneText;
    }

    // Cosmic Wisdom (mysterious alien fortune)
    const WISDOM = [
      "The signal is clear. Move quietly.",
      "A small choice becomes a large story.",
      "You are early. That is an advantage.",
      "Observe first. Then speak once.",
      "Proceed. But do not rush the outcome.",
      "You will understand later. Still counts.",
      "Do the easy thing. It is not a trap.",
      "If it repeats, it is trying to teach you."
    ];

    // Luck Aura: 0–100%, biased toward ~70%
    function randNormal(mean, sd){
      let u=0, v=0;
      while(u===0) u = Math.random();
      while(v===0) v = Math.random();
      const z = Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v);
      return mean + z*sd;
    }
    function rollAura(){
      const raw = randNormal(70, 14);
      return Math.max(0, Math.min(100, Math.round(raw)));
    }
    function auraLine(p){
      if (p >= 88) return "High luck. Lean in.";
      if (p >= 70) return "Luck is favourable.";
      if (p >= 55) return "Steady luck. Stay sharp.";
      if (p >= 40) return "Low luck. Proceed with caution.";
      return "Luck levels low. Keep it simple.";
    }

    // Lucky Colour: spin through colours then settle
    const COLOURS = [
      {name:"Ultraviolet", hex:"#7c3aed"},
      {name:"Ion Green", hex:"#22c55e"},
      {name:"Plasma Blue", hex:"#60a5fa"},
      {name:"Solar Gold", hex:"#f59e0b"},
      {name:"Signal Coral", hex:"#fb7185"},
      {name:"Void Indigo", hex:"#6366f1"},
      {name:"Cyan Drift", hex:"#06b6d4"}
    ];

    // Lucky Number: 0–9 (or change to 0–99 later)
    function rollNumber(){
      return Math.floor(Math.random() * 10);
    }

    // Bind buttons
    const btnWisdom = document.getElementById("btn-wisdom");
    const outWisdom = document.getElementById("out-wisdom");
    const subWisdom = document.getElementById("sub-wisdom");

    const btnAura = document.getElementById("btn-aura");
    const outAura = document.getElementById("out-aura");
    const subAura = document.getElementById("sub-aura");

    const btnColour = document.getElementById("btn-colour");
    const outColour = document.getElementById("out-colour");
    const subColour = document.getElementById("sub-colour");
    const barColour = document.getElementById("bar-colour");

    const btnNumber = document.getElementById("btn-number");
    const outNumber = document.getElementById("out-number");
    const subNumber = document.getElementById("sub-number");

    let busy = false;

    btnWisdom.addEventListener("click", async () => {
      if (busy || btnWisdom.disabled) return;
      busy = true;

      await scrambleTo(outWisdom, pick(WISDOM), 900);
      lockButton(btnWisdom, subWisdom, "Directive received.");
      busy = false;
    });

    btnAura.addEventListener("click", async () => {
      if (busy || btnAura.disabled) return;
      busy = true;

      const p = rollAura();
      const final = `${p}% — ${auraLine(p)}`;
      await scrambleTo(outAura, final, 950);
      lockButton(btnAura, subAura, "Scan complete.");
      busy = false;
    });

    btnColour.addEventListener("click", async () => {
      if (busy || btnColour.disabled) return;
      busy = true;

      // rapid colour cycling
      const start = performance.now();
      const dur = 950;
      let last = 0;

      function cycle(t){
        if (t - start >= dur) return;
        if (t - last > 55){
          last = t;
          const c = pick(COLOURS);
          barColour.style.background = c.hex;
          outColour.textContent = c.name;
        }
        requestAnimationFrame(cycle);
      }
      requestAnimationFrame(cycle);

      // settle
      const finalC = pick(COLOURS);
      barColour.style.background = finalC.hex;
      await scrambleTo(outColour, `${finalC.name} ${finalC.hex}`, 700);

      lockButton(btnColour, subColour, "Calibration complete.");
      busy = false;
    });

    btnNumber.addEventListener("click", async () => {
      if (busy || btnNumber.disabled) return;
      busy = true;

      const n = rollNumber();
      await scrambleTo(outNumber, String(n), 750);
      lockButton(btnNumber, subNumber, "Number received.");
      busy = false;
    });
  </script>
</body>
</html>
