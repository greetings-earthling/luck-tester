<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Alien Luck Tablet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- If you already have styles.css, keep this.
       If not, remove this line and paste your CSS into a <style> block. -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- TABLET ONLY (no top header) -->
  <main class="tablet" aria-label="Alien Luck Tablet">
    <div class="tabletInner">

      <!-- ROW 1 (2) -->
      <div class="row row2">

        <!-- Cosmic Wisdom -->
        <section class="widget" id="w-wisdom">
          <div class="wTop">
            <div class="wText">
              <h2 class="wTitle">Cosmic Wisdom</h2>
              <p class="wSub" id="sub-wisdom">Tap to receive.</p>
            </div>
            <button class="wBtn" id="btn-wisdom" type="button" aria-label="Reveal cosmic wisdom"
              style="--c1:#7c3aed;--c2:#22c55e"></button>
          </div>

          <div class="wBody">
            <div class="wOutput mono" id="out-wisdom">—</div>
          </div>
        </section>

        <!-- Luck Aura -->
        <section class="widget" id="w-aura">
          <div class="wTop">
            <div class="wText">
              <h2 class="wTitle">Luck Aura</h2>
              <p class="wSub" id="sub-aura">Tap to scan.</p>
            </div>
            <button class="wBtn" id="btn-aura" type="button" aria-label="Scan luck aura"
              style="--c1:#06b6d4;--c2:#7c3aed"></button>
          </div>

          <div class="wBody">
            <div class="wOutput mono" id="out-aura">—</div>
          </div>
        </section>

      </div>


      <!-- ROW 2 (3 with hub centered) -->
      <div class="row row3">

        <!-- Lucky Colour -->
        <section class="widget" id="w-colour">
          <div class="wTop">
            <div class="wText">
              <h2 class="wTitle">Lucky Colour</h2>
              <p class="wSub" id="sub-colour">Tap to calibrate.</p>
            </div>
            <button class="wBtn" id="btn-colour" type="button" aria-label="Reveal lucky colour"
              style="--c1:#f59e0b;--c2:#22c55e"></button>
          </div>

          <div class="wBody">
            <div class="wSwatch" id="swatch-colour" aria-hidden="true"></div>
            <div class="wOutput mono" id="out-colour">—</div>
          </div>
        </section>

        <!-- HUB (CENTER) -->
        <section class="widget hub" aria-label="Tablet hub">
          <div class="hubMark" aria-hidden="true">👽</div>
          <h1 class="hubTitle">Alien Luck Tablet</h1>
          <p class="hubSub">Daily directive for blending in.</p>
          <p class="hubHint">Refresh to reboot.</p>
        </section>

        <!-- Lucky Number -->
        <section class="widget" id="w-number">
          <div class="wTop">
            <div class="wText">
              <h2 class="wTitle">Lucky Number</h2>
              <p class="wSub" id="sub-number">Tap to receive.</p>
            </div>
            <button class="wBtn" id="btn-number" type="button" aria-label="Reveal lucky number"
              style="--c1:#fb7185;--c2:#60a5fa"></button>
          </div>

          <div class="wBody">
            <div class="wOutput mono" id="out-number">—</div>
          </div>
        </section>

      </div>


      <!-- ROW 3 (2) -->
      <div class="row row2">

        <!-- Earth Meal -->
        <section class="widget" id="w-meal">
          <div class="wTop">
            <div class="wText">
              <h2 class="wTitle">Earth Meal</h2>
              <p class="wSub" id="sub-meal">Tap to decide.</p>
            </div>
            <button class="wBtn" id="btn-meal" type="button" aria-label="Reveal earth meal"
              style="--c1:#22c55e;--c2:#a78bfa"></button>
          </div>

          <div class="wBody tall">
            <div class="wOutput mono" id="out-meal">—</div>
          </div>
        </section>

        <!-- Earth Entertainment -->
        <section class="widget" id="w-ent">
          <div class="wTop">
            <div class="wText">
              <h2 class="wTitle">Earth Entertainment</h2>
              <p class="wSub" id="sub-ent">Tap to observe.</p>
            </div>
            <button class="wBtn" id="btn-ent" type="button" aria-label="Reveal earth entertainment"
              style="--c1:#60a5fa;--c2:#f59e0b"></button>
          </div>

          <div class="wBody tall">
            <div class="wOutput mono" id="out-ent">—</div>
            <div class="wMeta" id="meta-ent"></div>
          </div>
        </section>

      </div>

    </div>
  </main>


  <!-- Reference lists -->
  <script defer src="watchlist.js"></script>
  <script defer src="fortunes.js"></script>
  <script defer src="dinnerlist.js"></script>

  <!-- Logic -->
  <script defer src="script.js"></script>

</body>
</html>
